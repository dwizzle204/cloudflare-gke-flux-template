apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multi-cluster-gateway
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  timeout: 3m
  prune: true
  wait: true
  dependsOn:
    - name: sample-app
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/infrastructure/gateway
