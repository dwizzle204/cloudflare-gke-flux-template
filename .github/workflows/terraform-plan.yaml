name: terraform-plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - "examples/minimal/**"
      - "tests/terratest/testdata/**"
      - ".github/workflows/terraform-plan.yaml"

permissions:
  contents: read

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/ci

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -refresh=false -lock=false -input=false -var-file=../../tests/terratest/testdata/ci.auto.tfvars

      - name: Validate minimal example
        working-directory: examples/minimal
        run: |
          terraform init -backend=false
          terraform validate
