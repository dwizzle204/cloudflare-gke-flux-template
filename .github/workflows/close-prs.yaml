name: close-prs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: close-prs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  close:
    runs-on: ubuntu-latest

    steps:
      - name: Close pull request with policy note
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: [
                "Thanks for the interest in this repository.",
                "",
                "This upstream repository is maintained as a learning template.",
                "Issues and forks are welcome, but pull requests are not accepted against the upstream template repository.",
                "",
                "Please create your own copy from the template or fork the repository for changes you want to keep and run there."
              ].join("\n")
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: number,
              state: "closed"
            });
