name: terratest

on:
  pull_request:
    paths:
      - "terraform/**"
      - "tests/terratest/**"
      - "terraform/ci/**"
      - "terraform/modules/core/**"
      - ".github/workflows/terratest.yaml"

permissions:
  contents: read

concurrency:
  group: terratest-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terratest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: tests/terratest/go.mod
          cache-dependency-path: tests/terratest/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Download Go modules
        run: go mod tidy
        working-directory: tests/terratest

      - name: Run Terratest suite
        run: go test -v ./... -count=1 -timeout 30m
        working-directory: tests/terratest
