name: terratest

on:
  pull_request:
    paths:
      - "terraform/**"
      - "tests/terratest/**"
      - "terraform/ci/**"
      - "terraform/modules/core/**"
      - ".github/workflows/terratest.yaml"

permissions:
  contents: read

concurrency:
  group: terratest-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terratest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tests/terratest/go.mod
          cache-dependency-path: tests/terratest/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Go modules
        run: go mod tidy
        working-directory: tests/terratest

      - name: Run Terratest suite
        run: go test -v ./... -count=1 -timeout 30m
        working-directory: tests/terratest
